<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./weather-app.css">
    <title>Document</title>
</head>
<body>
         
    <div class="card">
        <div class="search">
            <input  class="search-input" type="text" placeholder="Enter City Name" spellcheck="false">
            <button class="search-btn"><img src="./img/search-2.png"></button>
        </div>
        <div class="weather">
            <img src="./img/weather.png" class="">
            <h1 class="temp">30°C</h1>
            <h2 class="city">New York</h2>
            <div class="details">
                <div class="col">
                    <img src="./img/humidity.png">
                    
                    <div>
                        <p class="humidity">50%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="./img/wind-speed.png">
                    <div>
                        <p class="wind">15 km/h</p>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    

</body>
<script src="./weather-app.js"></script>
</html>
